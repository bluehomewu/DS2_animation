<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heap Animation</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.exports = {};
    window.require = function(mod) {
      if (mod === "react") return React;
      if (mod === "react-dom" || mod === "react-dom/client") return ReactDOM;
      throw new Error("Module not found: " + mod);
    };
  </script>
</head>
<body style="margin: 0">
  <div id="root"></div>
  <script type="text/babel" data-plugins="transform-modules-commonjs" src="heap-animation.jsx"></script>
  <script type="text/babel">
    const HeapAnimation = window.exports.default;
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<HeapAnimation />);
  </script>
</body>
</html>
